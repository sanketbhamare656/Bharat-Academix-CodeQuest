{% extends "base.html" %}

{% block title %}PhishNet - Website Preview Safeguard{% endblock %}

{% block content %}
<div id="warning-message">
    <i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i>
    <span><strong>PhishNet Safeguard Warning:</strong> Do not click on any elements or submit any form inputs inside this sandboxed preview.</span>
</div>
<div id="preview-container">
    {{ content | safe }}
</div>
{% endblock %}
