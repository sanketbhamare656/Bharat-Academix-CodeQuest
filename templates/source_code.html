{% extends "base.html" %}

{% block title %}PhishNet - URL Source Code Analysis{% endblock %}

{% block content %}
<section style="padding: 40px 0;">
    <div class="container">
        <div class="source-container">
            <div class="source-header">
                <h3>
                    <i class="fas fa-code" style="color: var(--primary); margin-right: 10px;"></i> 
                    Source Code of: <span style="font-family: monospace; font-size: 18px; word-break: break-all; color: var(--light); font-weight: normal;">{{ url }}</span>
                </h3>
            </div>
            <pre class="source-pre"><code>{{ formatted_html }}</code></pre>
        </div>
    </div>
</section>
{% endblock %}
